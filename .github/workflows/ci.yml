# Solo-dev CI: not a merge gate (you push straight to main) but a safety net +
# build factory. On every push to main it lints, type-checks, builds the web
# bundle, builds the Docker image, runs the test suite inside that image, and
# pushes the image to GHCR so "deploy" == "docker pull".
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Newer push supersedes an in-flight run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # needed to push the image to GHCR

jobs:
  # Fast feedback: Python lint/format + web typecheck/build. Fails in ~1-2 min
  # on a typo without waiting for the full image build.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev tooling
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

      - uses: pnpm/action-setup@v6
        with:
          # Use the latest pnpm rather than the "packageManager" pin (which lives
          # in web/, not the repo root, so the action can't auto-detect it).
          version: latest
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web deps
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Typecheck
        run: pnpm typecheck
        working-directory: web
      - name: Build web bundle
        run: pnpm build
        working-directory: web

  # Build the real image, run the test suite inside it (so tests run against the
  # exact runtime deps that ship), then push to GHCR on success.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: talos:ci
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

      - name: Run test suite inside the image
        # tests/ is excluded from the image (.dockerignore) to keep it lean, so
        # mount the repo's tests into the container at runtime — the image still
        # supplies the installed runtime deps and pyproject.toml config. Bypass
        # the privilege-dropping entrypoint and run pytest directly.
        run: >-
          docker run --rm
          -v "${{ github.workspace }}/tests:/app/tests:ro"
          --entrypoint pytest talos:ci -q

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Single-arch (amd64) to stay lean. To also ship arm64, add:
          #   platforms: linux/amd64,linux/arm64
          # (roughly doubles build time).
          tags: |
            ghcr.io/mosescommitsfraud/talos:latest
            ghcr.io/mosescommitsfraud/talos:${{ github.sha }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

  # Build the agent code-execution sandbox image (sandbox/Dockerfile, built from
  # the ./sandbox context — see the talos-sandbox service in docker-compose). It
  # carries its own heavy scientific-Python stack pinned in sandbox/requirements
  # .txt; the main `image` job above does NOT build it, so without this job the
  # Dependabot bumps to those pins would merge untested.
  sandbox-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Build sandbox image
        uses: docker/build-push-action@v7
        with:
          context: ./sandbox
          load: true
          tags: talos-sandbox:ci
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      - name: Smoke-test that key libraries import
        # Catches breakage from major bumps (weasyprint, pypdf, ipython, …) that
        # a successful build alone wouldn't surface. Invoke the venv python
        # DIRECTLY: the /usr/local/bin/python symlink doesn't reliably re-activate
        # the venv, so `python` via PATH would run the bare system interpreter
        # (no data libs). The agent's shell uses the venv via /etc/profile.d PATH.
        run: >-
          docker run --rm --entrypoint /opt/talos-sandbox-venv/bin/python talos-sandbox:ci -c
          "import numpy, pandas, scipy, sklearn, statsmodels, duckdb, weasyprint, pypdf, IPython, pymssql; print('sandbox imports OK')"
