# Solo-dev CI: not a merge gate (you push straight to main) but a safety net +
# build factory. On every push to main it lints, type-checks, builds the web
# bundle, builds the Docker image, runs the test suite inside that image, and
# pushes the image to GHCR so "deploy" == "docker pull".
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Newer push supersedes an in-flight run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # needed to push the image to GHCR

jobs:
  # Fast feedback: Python lint/format + web typecheck/build. Fails in ~1-2 min
  # on a typo without waiting for the full image build.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev tooling
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

      - uses: pnpm/action-setup@v4 # version comes from web/package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web deps
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Typecheck
        run: pnpm typecheck
        working-directory: web
      - name: Build web bundle
        run: pnpm build
        working-directory: web

  # Build the real image, run the test suite inside it (so tests run against the
  # exact runtime deps that ship), then push to GHCR on success.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: talos:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test suite inside the image
        # Bypass the privilege-dropping entrypoint and run pytest directly.
        run: docker run --rm --entrypoint pytest talos:ci -q

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Single-arch (amd64) to stay lean. To also ship arm64, add:
          #   platforms: linux/amd64,linux/arm64
          # (roughly doubles build time).
          tags: |
            ghcr.io/mosescommitsfraud/talos:latest
            ghcr.io/mosescommitsfraud/talos:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
