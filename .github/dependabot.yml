# Automated dependency-bump PRs. Solo-dev friendly: grouped so you get a few
# tidy PRs a week instead of a flood, and patch/minor updates are batched.
version: 2
updates:
  # Python runtime deps
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend (pnpm) deps
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Root Dockerfile base images (node:24-alpine webbuild, python:3.12-slim app)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  # Sandbox base image (sandbox/Dockerfile — the agent code-execution container;
  # node:22-bookworm-slim). Separate entry because directory "/" above only scans
  # the root Dockerfile.
  - package-ecosystem: docker
    directory: "/sandbox"
    schedule:
      interval: weekly

  # The GitHub Actions used in ci.yml below
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
