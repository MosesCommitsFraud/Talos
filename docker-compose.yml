services:
  talos-app:
    build: .
    container_name: talos
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-7000}:7000"
    volumes:
      - ./data:/app/data:z
      - ./logs:/app/logs:z
      # Uploads live in a named volume shared with the sandbox — not the host
      # bind-mounted ./data — so they sit in the sandbox and don't clutter the repo.
      - talos-uploads:/srv/uploads
    environment:
      - TALOS_UPLOAD_DIR=/srv/uploads
      - APP_BIND=${APP_BIND:-127.0.0.1}
      - APP_PORT=${APP_PORT:-7000}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - LOCALHOST_BYPASS=${LOCALHOST_BYPASS:-false}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - TALOS_ADMIN_USER=${TALOS_ADMIN_USER:-admin}
      - TALOS_ADMIN_PASSWORD=${TALOS_ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - LLM_HOST=${LLM_HOST:-your-llm-host}
      - LLM_HOSTS=${LLM_HOSTS:-your-llm-host}
      # Force native (OpenAI-style) tool calling on for all endpoints, like Open
      # WebUI. Set true for self-hosted vLLM/llama.cpp launched with
      # --enable-auto-tool-choice. Hugely improves tool/edit reliability.
      - TALOS_ASSUME_NATIVE_TOOLS=${TALOS_ASSUME_NATIVE_TOOLS:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - EMBEDDING_URL=${EMBEDDING_URL:-http://your-llm-host:8001/v1/embeddings}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embed}
      # RAG: Qdrant (hybrid dense+sparse) + Redis-backed async ingest. These are
      # only fallback defaults — the admin sets the real endpoints/models per UI
      # field (Settings → RAG); the worker receives them as a job snapshot.
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - RAG_SPARSE_MODEL=${RAG_SPARSE_MODEL:-Qdrant/bm25}
      # Opt-in audio/video transcription. Harmless when unset: the lane only
      # activates when the admin turns on "Video / ASR" in Advanced settings AND
      # VIDEO_ASR_URL points at an ASR service exposing Talos' /transcribe API.
      - VIDEO_ASR_URL=${VIDEO_ASR_URL:-}
      # Redis/Valkey runs with NO password by default — it has no published port
      # and is reachable only by sibling containers on the Docker network, so the
      # network is the trust boundary. For defense-in-depth, set RAG_REDIS_PASSWORD
      # in .env; it's then enforced on the server and injected into this URL.
      - REDIS_URL=${REDIS_URL:-redis://:${RAG_REDIS_PASSWORD:-}@rag-redis:6379/0}
      - TALOS_SANDBOX_URL=${TALOS_SANDBOX_URL:-http://talos-sandbox:7800}
      # Shared secret the app sends on every sandbox API call. Set this in your
      # .env to a long random string to require auth on the sandbox daemon.
      - TALOS_SANDBOX_KEY=${TALOS_SANDBOX_KEY:-}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    networks:
      # `default` gives the app internet/LAN access (vLLM, embeddings, SQL).
      # `sandbox-net` is the private, internet-less network it shares with the
      # sandbox so it can reach talos-sandbox:7800.
      - default
      - sandbox-net
    depends_on:
      talos-sandbox:
        condition: service_started
      qdrant:
        condition: service_started
      rag-redis:
        condition: service_started
    restart: unless-stopped

  # Vector store for RAG: dense + sparse (BM25/IDF) named vectors, server-side
  # RRF hybrid fusion. Multi-arch image (runs on both ARM64 and AMD64 hosts).
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    # Internal-only by default; rag-api/worker reach it by service name. Expose
    # 6333 here if you want the Qdrant dashboard from the host.
    # ports:
    #   - "6333:6333"
    networks:
      - default

  # Broker for the async ingest queue (RQ). No port is published, so it's only
  # reachable by sibling containers — runs without auth by default. An empty
  # --requirepass disables password auth; set RAG_REDIS_PASSWORD in .env to enable.
  rag-redis:
    image: valkey/valkey:8
    container_name: rag-redis
    restart: unless-stopped
    command: ["valkey-server", "--requirepass", "${RAG_REDIS_PASSWORD:-}"]
    volumes:
      - rag-redis-data:/data
    networks:
      - default

  # Pulls ingest jobs off Redis and runs the heavy Docling parse + HybridChunk +
  # embed + Qdrant upsert, so the web process never blocks on uploads. Same image
  # as talos-app; shares the uploads volume so files are physically present.
  rag-ingest-worker:
    build: .
    container_name: rag-ingest-worker
    restart: unless-stopped
    command: ["rq", "worker", "ingest", "--url", "${REDIS_URL:-redis://:${RAG_REDIS_PASSWORD:-}@rag-redis:6379/0}"]
    environment:
      - REDIS_URL=${REDIS_URL:-redis://:${RAG_REDIS_PASSWORD:-}@rag-redis:6379/0}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - EMBEDDING_URL=${EMBEDDING_URL:-http://your-llm-host:8001/v1/embeddings}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embed}
      - RAG_SPARSE_MODEL=${RAG_SPARSE_MODEL:-Qdrant/bm25}
      # Same opt-in ASR endpoint as the app — the worker is what actually calls
      # it during ingest. Inert unless the Advanced toggle is on.
      - VIDEO_ASR_URL=${VIDEO_ASR_URL:-}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./data:/app/data:z
      - ./logs:/app/logs:z
      - talos-uploads:/srv/uploads
    networks:
      - default
    depends_on:
      qdrant:
        condition: service_started
      rag-redis:
        condition: service_started

  talos-sandbox:
    build:
      context: ./sandbox
    container_name: talos-sandbox
    volumes:
      - talos-sandbox-home:/home/talos
      - talos-sandbox-state:/var/lib/talos-sandbox
      # Same uploads volume the app writes to — so uploaded files are physically
      # present inside the sandbox and can be copied into chat workspaces.
      - talos-uploads:/srv/uploads
    environment:
      - TALOS_SANDBOX_HOME_ROOT=/home/talos
      - TALOS_SANDBOX_STATE=/var/lib/talos-sandbox/state.json
      # Same shared secret as the app — when set, the daemon rejects unauthenticated calls.
      - TALOS_SANDBOX_KEY=${TALOS_SANDBOX_KEY:-}
      - TALOS_SANDBOX_APT_PACKAGES=${TALOS_SANDBOX_APT_PACKAGES:-}
      - TALOS_SANDBOX_PIP_PACKAGES=${TALOS_SANDBOX_PIP_PACKAGES:-}
      - TALOS_SANDBOX_NPM_PACKAGES=${TALOS_SANDBOX_NPM_PACKAGES:-}
    # Resource caps (OpenTerminal-style) so runaway code can't exhaust the host.
    # No wall-clock/timeout limit — long runs are allowed by design.
    mem_limit: ${TALOS_SANDBOX_MEM:-6g}
    cpus: ${TALOS_SANDBOX_CPUS:-4}
    pids_limit: ${TALOS_SANDBOX_PIDS:-1024}
    networks:
      # ONLY the private internal network → the sandbox has NO internet/LAN
      # access. The app reaches it here; it can't initiate outbound connections.
      - sandbox-net
    restart: unless-stopped

networks:
  default: {}
  sandbox-net:
    internal: true

volumes:
  talos-sandbox-home:
  talos-sandbox-state:
  talos-uploads:
  qdrant-data:
  rag-redis-data:
