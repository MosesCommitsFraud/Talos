services:
  talos-app:
    build: .
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-7000}:7000"
    volumes:
      - ./data:/app/data:z
      - ./logs:/app/logs:z
      # Uploads live in a named volume shared with the sandbox — not the host
      # bind-mounted ./data — so they sit in the sandbox and don't clutter the repo.
      - talos-uploads:/srv/uploads
    environment:
      - TALOS_UPLOAD_DIR=/srv/uploads
      - APP_BIND=${APP_BIND:-127.0.0.1}
      - APP_PORT=${APP_PORT:-7000}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - LOCALHOST_BYPASS=${LOCALHOST_BYPASS:-false}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - TALOS_ADMIN_USER=${TALOS_ADMIN_USER:-admin}
      - TALOS_ADMIN_PASSWORD=${TALOS_ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - LLM_HOST=${LLM_HOST:-192.168.10.91}
      - LLM_HOSTS=${LLM_HOSTS:-192.168.10.91}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - EMBEDDING_URL=${EMBEDDING_URL:-http://192.168.10.91:8001/v1/embeddings}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embed}
      - TALOS_SANDBOX_URL=${TALOS_SANDBOX_URL:-http://talos-sandbox:7800}
      # Shared secret the app sends on every sandbox API call. Set this in your
      # .env to a long random string to require auth on the sandbox daemon.
      - TALOS_SANDBOX_KEY=${TALOS_SANDBOX_KEY:-}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    networks:
      # `default` gives the app internet/LAN access (vLLM, embeddings, SQL).
      # `sandbox-net` is the private, internet-less network it shares with the
      # sandbox so it can reach talos-sandbox:7800.
      - default
      - sandbox-net
    depends_on:
      talos-sandbox:
        condition: service_started
    restart: unless-stopped

  talos-sandbox:
    build:
      context: ./sandbox
    volumes:
      - talos-sandbox-home:/home/talos
      - talos-sandbox-state:/var/lib/talos-sandbox
      # Same uploads volume the app writes to — so uploaded files are physically
      # present inside the sandbox and can be copied into chat workspaces.
      - talos-uploads:/srv/uploads
    environment:
      - TALOS_SANDBOX_HOME_ROOT=/home/talos
      - TALOS_SANDBOX_STATE=/var/lib/talos-sandbox/state.json
      # Same shared secret as the app — when set, the daemon rejects unauthenticated calls.
      - TALOS_SANDBOX_KEY=${TALOS_SANDBOX_KEY:-}
      - TALOS_SANDBOX_APT_PACKAGES=${TALOS_SANDBOX_APT_PACKAGES:-}
      - TALOS_SANDBOX_PIP_PACKAGES=${TALOS_SANDBOX_PIP_PACKAGES:-}
      - TALOS_SANDBOX_NPM_PACKAGES=${TALOS_SANDBOX_NPM_PACKAGES:-}
    # Resource caps (OpenTerminal-style) so runaway code can't exhaust the host.
    # No wall-clock/timeout limit — long runs are allowed by design.
    mem_limit: ${TALOS_SANDBOX_MEM:-6g}
    cpus: ${TALOS_SANDBOX_CPUS:-4}
    pids_limit: ${TALOS_SANDBOX_PIDS:-1024}
    networks:
      # ONLY the private internal network → the sandbox has NO internet/LAN
      # access. The app reaches it here; it can't initiate outbound connections.
      - sandbox-net
    restart: unless-stopped

networks:
  default: {}
  sandbox-net:
    internal: true

volumes:
  talos-sandbox-home:
  talos-sandbox-state:
  talos-uploads:
