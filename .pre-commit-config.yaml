# Local commit-time gate — the solo-dev stand-in for PR checks.
# One-time setup:
#   pip install -r requirements-dev.txt
#   pre-commit install
# Normalize the existing tree once (formats + auto-fixes everything):
#   pre-commit run --all-files
#
# After that it runs automatically on `git commit`, touching only staged files.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      # Lint (auto-fixes what it safely can, e.g. import sorting / unused imports).
      - id: ruff
        args: [--fix]
      # Format (Black-compatible).
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        # --unsafe: syntax-only check. mkdocs.yml uses pymdownx's
        # `!!python/name:...` YAML tags, which standard safe-load can't construct.
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=1024]
        # Mermaid is vendored locally for offline rendering (see mkdocs.yml); the
        # minified bundle is legitimately >1 MB.
        exclude: ^docs/javascripts/mermaid\.min\.js$
